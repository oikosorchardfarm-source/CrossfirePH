<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="wheelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a00" />
      <stop offset="70%" stop-color="#8200ff" />
      <stop offset="100%" stop-color="#080a16" />
    </radialGradient>
    <linearGradient id="segment" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6c12d" />
      <stop offset="100%" stop-color="#e53e3e" />
    </linearGradient>
  </defs>
  <circle cx="600" cy="600" r="560" fill="url(#wheelGrad)" stroke="#ffffff" stroke-width="12" opacity="0.9" />

  <!-- Prize labels around the wheel -->
  <g font-family="Inter, system-ui, sans-serif" font-size="24" fill="#ffffff" opacity="0.9" text-anchor="middle">
    <text transform="translate(600,600) rotate(0) translate(0,-460)">500 eCoins</text>
    <text transform="translate(600,600) rotate(45) translate(0,-460)">VIP Weapon</text>
    <text transform="translate(600,600) rotate(90) translate(0,-460)">Double EXP</text>
    <text transform="translate(600,600) rotate(135) translate(0,-460)">Rare Skin</text>
    <text transform="translate(600,600) rotate(180) translate(0,-460)">1000 eCoins</text>
    <text transform="translate(600,600) rotate(225) translate(0,-460)">Legendary</text>
    <text transform="translate(600,600) rotate(270) translate(0,-460)">Exclusive</text>
    <text transform="translate(600,600) rotate(315) translate(0,-460)">Mystery Crate</text>
  </g>

  <g stroke="#ffffff" stroke-width="6">
    <path d="M600,40 L620,120" />
    <path d="M600,40 L580,120" />
    <path d="M600,1160 L620,1080" />
    <path d="M600,1160 L580,1080" />
    <path d="M40,600 L120,620" />
    <path d="M40,600 L120,580" />
    <path d="M1160,600 L1080,620" />
    <path d="M1160,600 L1080,580" />
  </g>
  <g stroke="#ffffff" stroke-width="4">
    <path d="M600,50 A550,550 0 0,1 1150,600" />
    <path d="M600,50 A550,550 0 0,0 50,600" />
    <path d="M600,1150 A550,550 0 0,1 1150,600" />
    <path d="M600,1150 A550,550 0 0,0 50,600" />
  </g>
  <polygon points="590,100 610,100 610,60 590,60" fill="#ffec00" stroke="#fff" stroke-width="4" />
  <text x="600" y="620" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="80" fill="#ffffff" font-weight="700">SPIN</text>
  <text x="600" y="700" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="42" fill="#ffffff" opacity="0.85">THE WHEEL</text>
</svg>
